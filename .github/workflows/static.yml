# Script automatique pour déployer un projet Vite sur GitHub Pages
name: Deploy Vite Site

on:
  push:
    branches: ["main"] # Vérifie que ta branche s'appelle bien "main" (sinon change en "master")

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # C'est ici que Vite range tes fichiers compilés

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
